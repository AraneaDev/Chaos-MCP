name: Container images

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      version:
        description: Image tag
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Image tag
        required: true
        default: edge

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        language: [typescript, python, rust, php]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: echo "value=${REQUESTED_VERSION:-${GITHUB_REF_NAME}}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/${{ matrix.language }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/araneadev/chaos-mcp-${{ matrix.language }}:${{ steps.version.outputs.value }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.language }}
          cache-to: type=gha,mode=max,scope=${{ matrix.language }}
