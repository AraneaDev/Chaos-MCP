name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build, Test, Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Preserve shebang on built entry point
        run: |
          # Ensure the built index.js starts with the shebang line
          # tsc strips shebangs from emitted files — re-add it
          node -e "
            const fs = require('fs');
            const path = './build/index.js';
            let content = fs.readFileSync(path, 'utf-8');
            if (!content.startsWith('#!/usr/bin/env node')) {
              fs.writeFileSync(path, '#!/usr/bin/env node\n' + content);
              console.log('Shebang restored in build/index.js');
            } else {
              console.log('Shebang already present');
            }
          "

      - name: Verify build
        run: |
          # Verify the CLI starts and responds to --version
          node ./build/index.js --version
          # Verify the bin is executable
          chmod +x ./build/index.js

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Publish to npm (provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
