name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Full Check Pipeline (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The `npm run check` script runs all four stages sequentially:
      # build → lint → format:check → test
      # Using it as a single step ensures the same pipeline runs in CI
      # and locally. If any stage fails, subsequent stages are skipped
      # and the job fails — which becomes a required status check.
      - name: Run full check pipeline
        run: npm run check

      # Separate typecheck step — runs even if `npm run check` fails,
      # so type errors are surfaced in CI logs regardless of which
      # pipeline stage failed first.
      - name: Typecheck
        if: always()
        run: npx tsc --noEmit

      # Smoke test the CLI binary: verify --validate-config and
      # --validate-config --strict exit with the expected codes and
      # report warnings correctly to stderr.
      - name: 'CLI: validate-config smoke tests'
        if: always()
        run: npx vitest run src/__tests__/cli-validate-config.test.ts

  container-build:
    name: Container Build (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: typescript
            smoke-command: stryker --version
          - language: python
            smoke-command: cosmic-ray --version
          - language: rust
            smoke-command: cargo mutants --version
          - language: php
            smoke-command: infection --version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.language }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/${{ matrix.language }}/Dockerfile
          load: true
          push: false
          tags: chaos-mcp-${{ matrix.language }}:ci
          cache-from: type=gha,scope=container-${{ matrix.language }}
          cache-to: type=gha,mode=max,scope=container-${{ matrix.language }}

      - name: Smoke-test pinned mutation engine
        run: docker run --rm chaos-mcp-${{ matrix.language }}:ci ${{ matrix.smoke-command }}
